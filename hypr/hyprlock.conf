background {
    monitor=
    path= $HOME/dots/walls/lock.jpeg
}

label {
    monitor =
    text = <span foreground='##000000'>Hi there, $USER</span>
    color = rgba(0.0, 0.0, 0.0, 1.0)
    font_size = 25
    font_family = Iosevka NFM

    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##000000'>$(date)</span>"
    color = rgba(0.0, 0.0, 0.0, 1.0)
    font_size = 25
    font_family = Iosevka NFM
    position = 0,120
    halign = center
    valign = center
}

input-field {
    monitor=
    size=20%,5%
    outine-thickness=1
    dots_size=0.1
    dots_spacing=0.5
    fade_on_empty=true
    hide_input=false
    fade_timeout=1000
}


label {
    monitor = 
    text = cmd[update:1000] echo "<span foreground='##000000'>$(upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep percentage;)</span>"
    color = rgba(0.0, 0.0, 0.0, 1.0)
    font_size = 25
    font_family = Iosevka NFM
    position = 0,-120
    halign = center
    valign = center
}
